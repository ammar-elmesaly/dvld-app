name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (workspaces)
        run: npm ci

      - name: Build shared
        run: npm run build
        working-directory: packages/shared

      - name: Build server
        run: npm run build
        working-directory: packages/server

      - name: Build client (without packaging)
        run: npm run build
        working-directory: packages/client

      - name: Lint client
        run: npm run lint
        working-directory: packages/client